name: PlumbingHands Continuity Smoke Diagnostic

on:
  push:
    branches: [test/continuity-smoke-20260716]
  workflow_dispatch:

permissions:
  contents: read
  statuses: write

jobs:
  status-diagnostic:
    runs-on: windows-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run Status diagnostic and publish exact result
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
          REPOSITORY: ${{ github.repository }}
          TEST_SHA: ${{ github.sha }}
          RUN_ID: ${{ github.run_id }}
          SERVER_URL: ${{ github.server_url }}
        run: |
          $ErrorActionPreference = 'Stop'
          $state = 'failure'
          $description = 'Diagnostic failed before result capture'
          try {
            $branch = 'codex/workflow-resume-20260716'
            git fetch origin $branch
            git checkout -B $branch "origin/$branch"
            if ((git branch --show-current).Trim() -ne $branch) { throw 'Target branch checkout failed' }
            if (git status --porcelain) { throw 'Target branch checkout is dirty' }

            $task = Join-Path $PWD 'command-center\continuity-smoke-task.txt'
            @(
              'REPOSITORY: affankhan147-arch/ppc-website'
              'BRANCH: codex/workflow-resume-20260716'
              'STATUS: ready-to-resume'
              'TASK: Continuity controller smoke diagnostic only.'
              'REQUIRED REPORT: reports/continuity_smoke_result.md'
            ) | Set-Content -LiteralPath $task -Encoding UTF8

            $controller = Join-Path $PWD 'command-center\PlumbingHands_Agent_Continuity.ps1'
            $output = & powershell.exe -NoLogo -NoProfile -ExecutionPolicy Bypass -File $controller -Mode Status -TaskPath $task -AllowDirtyWorktree 2>&1
            $code = $LASTEXITCODE
            $text = ($output | ForEach-Object { [string]$_ }) -join ' | '
            Write-Host $text
            if ($code -ne 0) { throw "Status exit $code: $text" }
            if ($text -notmatch 'RESULT: STATUS VERIFIED') { throw "Status marker missing: $text" }

            $state = 'success'
            $description = 'Status mode passed on Windows PowerShell 5.1'
          }
          catch {
            $description = ($_.Exception.Message -replace '[\r\n]+',' ')
            if ($description.Length -gt 135) { $description = $description.Substring(0,135) }
            Write-Host "DIAGNOSTIC FAILURE: $description"
          }
          finally {
            $body = @{
              state = $state
              context = 'PlumbingHands Continuity Diagnostic'
              description = $description
              target_url = "$env:SERVER_URL/$env:REPOSITORY/actions/runs/$env:RUN_ID"
            } | ConvertTo-Json
            $request = @{
              Uri = "https://api.github.com/repos/$env:REPOSITORY/statuses/$env:TEST_SHA"
              Method = 'Post'
              Headers = @{
                Authorization = "Bearer $env:GH_TOKEN"
                Accept = 'application/vnd.github+json'
                'X-GitHub-Api-Version' = '2022-11-28'
              }
              ContentType = 'application/json'
              Body = $body
            }
            Invoke-RestMethod @request | Out-Null
          }
          if ($state -ne 'success') { exit 1 }
