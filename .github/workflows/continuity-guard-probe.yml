name: PlumbingHands Continuity Guard Probe

on:
  push:
    branches:
      - test/continuity-smoke-20260716

permissions:
  contents: read
  statuses: write

jobs:
  guard-probe:
    runs-on: windows-latest
    timeout-minutes: 15
    steps:
      - name: Build verified local continuity state
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          git clone --branch codex/workflow-resume-20260716 --single-branch https://github.com/affankhan147-arch/ppc-website.git repo
          Set-Location repo
          $path = 'command-center\PlumbingHands_Agent_Continuity.ps1'
          $content = Get-Content $path -Raw
          $content = $content.Replace('[string]$RepositoryRoot = (Split-Path -Parent $PSScriptRoot),','[string]$RepositoryRoot,')
          $anchor = "`$ErrorActionPreference = 'Stop'"
          $insert = @("`$ErrorActionPreference = 'Stop'",'', 'if ([string]::IsNullOrWhiteSpace($RepositoryRoot)) {','    $RepositoryRoot = Split-Path -Parent $PSScriptRoot','}') -join [Environment]::NewLine
          $content = $content.Replace($anchor,$insert)
          Set-Content $path $content -Encoding UTF8 -NoNewline
          git config user.name 'PlumbingHands Guard Probe'
          git config user.email 'actions@users.noreply.github.com'
          git add $path
          git commit -m 'test: local compatibility fix'

          $task = (Join-Path $PWD 'command-center\continuity-smoke-task.txt')
          @('REPOSITORY: affankhan147-arch/ppc-website','BRANCH: codex/workflow-resume-20260716','STATUS: ready-to-resume','TASK: Guard probe','REQUIRED REPORT: reports/continuity_smoke_result.md') | Set-Content $task -Encoding UTF8
          $controller = (Resolve-Path $path).Path
          & powershell.exe -NoLogo -NoProfile -ExecutionPolicy Bypass -File $controller -Mode Prepare -TaskPath $task -AllowDirtyWorktree
          if ($LASTEXITCODE -ne 0) { throw 'Prepare failed.' }
          $manifestFile = Get-ChildItem 'command-center\antigravity-queue' -Recurse -Filter continuity-manifest.json | Sort-Object LastWriteTimeUtc -Descending | Select-Object -First 1
          $bundle = $manifestFile.Directory.FullName
          'proof' | Set-Content 'src\data\continuitySmokeProof.txt'
          '# result' | Set-Content 'reports\continuity_smoke_result.md'
          git add --all
          git commit -m 'test: local verification evidence'
          & powershell.exe -NoLogo -NoProfile -ExecutionPolicy Bypass -File $controller -Mode Resume -BundlePath $bundle -AllowDirtyWorktree
          if ($LASTEXITCODE -ne 0) { throw 'Resume failed.' }
          Start-Sleep 1
          & powershell.exe -NoLogo -NoProfile -ExecutionPolicy Bypass -File $controller -Mode Verify -BundlePath $bundle -AllowDirtyWorktree
          if ($LASTEXITCODE -ne 0) { throw 'Verify failed.' }
          "REPO_PATH=$PWD" | Out-File $env:GITHUB_ENV -Append -Encoding utf8
          "CONTROLLER_PATH=$controller" | Out-File $env:GITHUB_ENV -Append -Encoding utf8
          "TASK_PATH=$task" | Out-File $env:GITHUB_ENV -Append -Encoding utf8
          "BUNDLE_PATH=$bundle" | Out-File $env:GITHUB_ENV -Append -Encoding utf8

      - name: Dirty-worktree guard
        shell: pwsh
        run: |
          Set-Location $env:REPO_PATH
          'unrelated' | Set-Content 'unrelated-smoke.txt'
          $output = & powershell.exe -NoLogo -NoProfile -ExecutionPolicy Bypass -File $env:CONTROLLER_PATH -Mode Status -TaskPath $env:TASK_PATH 2>&1
          $code = $LASTEXITCODE
          $text = ($output | ForEach-Object { [string]$_ }) -join "`n"
          Write-Host $text
          if ($code -eq 0) { throw 'Dirty guard unexpectedly succeeded.' }
          if ($text -notmatch 'Working tree contains changes outside generated continuity artifacts') { throw 'Dirty guard returned the wrong failure.' }
          Remove-Item 'unrelated-smoke.txt' -Force

      - name: Source-task hash guard
        shell: pwsh
        run: |
          Set-Location $env:REPO_PATH
          Add-Content $env:TASK_PATH 'TAMPERED AFTER PREPARE'
          $output = & powershell.exe -NoLogo -NoProfile -ExecutionPolicy Bypass -File $env:CONTROLLER_PATH -Mode Resume -BundlePath $env:BUNDLE_PATH -AllowDirtyWorktree 2>&1
          $code = $LASTEXITCODE
          $text = ($output | ForEach-Object { [string]$_ }) -join "`n"
          Write-Host $text
          if ($code -eq 0) { throw 'Hash guard unexpectedly succeeded.' }
          if ($text -notmatch 'Source task changed after preparation') { throw 'Hash guard returned the wrong failure.' }
          git checkout -- 'command-center/continuity-smoke-task.txt'

      - name: Branch guard
        shell: pwsh
        run: |
          Set-Location $env:REPO_PATH
          $output = & powershell.exe -NoLogo -NoProfile -ExecutionPolicy Bypass -File $env:CONTROLLER_PATH -Mode Status -Branch master -TaskPath $env:TASK_PATH -AllowDirtyWorktree 2>&1
          $code = $LASTEXITCODE
          $text = ($output | ForEach-Object { [string]$_ }) -join "`n"
          Write-Host $text
          if ($code -eq 0) { throw 'Branch guard unexpectedly succeeded.' }
          if ($text -notmatch 'Branch mismatch') { throw 'Branch guard returned the wrong failure.' }

      - name: Publish guard probe status
        if: always()
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
          REPOSITORY: ${{ github.repository }}
          TEST_SHA: ${{ github.sha }}
          RUN_ID: ${{ github.run_id }}
          SERVER_URL: ${{ github.server_url }}
          JOB_STATUS: ${{ job.status }}
        run: |
          $state = if ($env:JOB_STATUS -eq 'success') { 'success' } else { 'failure' }
          $body = @{state=$state;context='PlumbingHands Continuity Guard Probe';description="Guard probe $state";target_url="$env:SERVER_URL/$env:REPOSITORY/actions/runs/$env:RUN_ID"} | ConvertTo-Json
          Invoke-RestMethod -Uri "https://api.github.com/repos/$env:REPOSITORY/statuses/$env:TEST_SHA" -Method Post -Headers @{Authorization="Bearer $env:GH_TOKEN";Accept='application/vnd.github+json';'X-GitHub-Api-Version'='2022-11-28'} -ContentType 'application/json' -Body $body | Out-Null
