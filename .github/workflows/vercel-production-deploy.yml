name: Vercel Production Deploy

on:
  push:
    branches:
      - master
    paths:
      - "src/**"
      - "public/**"
      - "package.json"
      - "package-lock.json"
      - "next.config.*"
      - ".github/workflows/vercel-production-deploy.yml"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: plumbinghands-vercel-production
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN || secrets.VERCEL_ACCESS_TOKEN || secrets.VERCEL_CLI_TOKEN }}
      VERCEL_SCOPE: affankhan147-1002s-projects
      VERCEL_PROJECT: plumbinghands
    steps:
      - name: Check out production source
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Authenticate Vercel securely
        shell: bash
        run: |
          if [ -n "$VERCEL_TOKEN" ]; then
            echo "Using the configured Vercel CI credential."
          else
            echo "No repository token is configured. Starting Vercel OAuth device authorization."
            echo "Open the authorization URL shown below and approve this temporary deployment runner."
            timeout 15m script -q -e -c "npx --yes vercel@latest login --no-browser" /dev/null
          fi

      - name: Link existing PlumbingHands project
        shell: bash
        run: |
          args=(--yes --project "$VERCEL_PROJECT" --scope "$VERCEL_SCOPE")
          if [ -n "$VERCEL_TOKEN" ]; then args+=(--token "$VERCEL_TOKEN"); fi
          npx --yes vercel@latest link "${args[@]}"

      - name: Deploy current master to production
        shell: bash
        run: |
          args=(--prod --yes --scope "$VERCEL_SCOPE")
          if [ -n "$VERCEL_TOKEN" ]; then args+=(--token "$VERCEL_TOKEN"); fi
          npx --yes vercel@latest deploy "${args[@]}"
