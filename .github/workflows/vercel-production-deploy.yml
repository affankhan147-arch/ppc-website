name: Vercel Production Deploy

on:
  push:
    branches:
      - master
    paths:
      - "src/**"
      - "public/**"
      - "package.json"
      - "package-lock.json"
      - "next.config.*"
      - ".github/workflows/vercel-production-deploy.yml"
  workflow_dispatch:

permissions:
  contents: read
  issues: write
  pull-requests: write

concurrency:
  group: plumbinghands-vercel-production
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN || secrets.VERCEL_ACCESS_TOKEN || secrets.VERCEL_CLI_TOKEN }}
      VERCEL_SCOPE: affankhan147-1002s-projects
      VERCEL_PROJECT: plumbinghands
      AUTH_PR_NUMBER: "16"
      GH_TOKEN: ${{ github.token }}
    steps:
      - name: Check out production source
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Authenticate Vercel securely
        shell: bash
        run: |
          set -euo pipefail
          if [ -n "$VERCEL_TOKEN" ]; then
            echo "Using the configured Vercel CI credential."
            exit 0
          fi

          echo "No repository token is configured. Starting Vercel OAuth device authorization."
          login_log="$(mktemp)"
          script -q -e -c "npx --yes vercel@latest login" /dev/null >"$login_log" 2>&1 &
          login_pid=$!

          sleep 15
          clean_log="$(python3 - "$login_log" <<'PY'
          import re
          import sys
          from pathlib import Path
          text = Path(sys.argv[1]).read_text(errors='replace')
          text = re.sub(r'\x1b\[[0-?]*[ -/]*[@-~]', '', text)
          print(text[-6000:])
          PY
          )"

          auth_url="$(printf '%s\n' "$clean_log" | grep -Eo 'https://vercel\.com/[^[:space:]]+' | head -n 1 | tr -d '\r' || true)"
          if [ -n "$auth_url" ]; then
            comment="Temporary Vercel production authorization is ready: ${auth_url}\n\nApprove this short-lived device request. The runner will then deploy the current master revision to the existing plumbinghands production project automatically."
          else
            comment="Vercel device-login output did not contain a recognized URL. Diagnostic output:\n\n\`\`\`text\n${clean_log}\n\`\`\`"
          fi
          gh api "repos/${GITHUB_REPOSITORY}/issues/${AUTH_PR_NUMBER}/comments" -f body="$comment"

          set +e
          wait "$login_pid"
          login_code=$?
          set -e
          if [ "$login_code" -ne 0 ]; then
            echo "$clean_log"
            exit "$login_code"
          fi

      - name: Link existing PlumbingHands project
        shell: bash
        run: |
          set -euo pipefail
          args=(--yes --project "$VERCEL_PROJECT" --scope "$VERCEL_SCOPE")
          if [ -n "$VERCEL_TOKEN" ]; then args+=(--token "$VERCEL_TOKEN"); fi
          npx --yes vercel@latest link "${args[@]}"

      - name: Deploy current master to production
        shell: bash
        run: |
          set -euo pipefail
          args=(--prod --yes --scope "$VERCEL_SCOPE")
          if [ -n "$VERCEL_TOKEN" ]; then args+=(--token "$VERCEL_TOKEN"); fi
          npx --yes vercel@latest deploy "${args[@]}"
