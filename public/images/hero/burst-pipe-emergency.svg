<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 720" role="img" aria-labelledby="title desc">
  <title id="title">Burst pipe emergency</title>
  <desc id="desc">A full-width plumbing illustration showing a broken pipe, controlled water flow, and an emergency shutoff valve.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#071a2b"/>
      <stop offset="0.58" stop-color="#0b5d77"/>
      <stop offset="1" stop-color="#e84d0e"/>
    </linearGradient>
    <linearGradient id="pipe" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#dff7ff"/>
      <stop offset="0.55" stop-color="#9adcec"/>
      <stop offset="1" stop-color="#effcff"/>
    </linearGradient>
    <filter id="shadow" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="0" dy="18" stdDeviation="18" flood-color="#00101c" flood-opacity=".35"/>
    </filter>
  </defs>
  <rect width="1200" height="720" rx="38" fill="url(#bg)"/>
  <g opacity=".12" stroke="#fff" stroke-width="2">
    <path d="M0 130h1200M0 360h1200M0 590h1200"/>
    <path d="M170 0v720M600 0v720M1030 0v720"/>
  </g>
  <g filter="url(#shadow)">
    <path d="M95 330h330" fill="none" stroke="url(#pipe)" stroke-width="82" stroke-linecap="round"/>
    <path d="M775 330h330" fill="none" stroke="url(#pipe)" stroke-width="82" stroke-linecap="round"/>
    <path d="M430 330l62-42 52 50 54-63 65 62 66-46 46 39" fill="none" stroke="#f6fbff" stroke-width="28" stroke-linecap="round" stroke-linejoin="round"/>
  </g>
  <g fill="#8de8fb" opacity=".95">
    <path d="M588 372c-34 43-63 84-63 121a63 63 0 0 0 126 0c0-37-29-78-63-121z"/>
    <path d="M682 388c-20 27-37 51-37 74a37 37 0 0 0 74 0c0-23-17-47-37-74z" opacity=".72"/>
    <circle cx="747" cy="438" r="14" opacity=".65"/>
  </g>
  <g transform="translate(185 135)" filter="url(#shadow)">
    <circle cx="0" cy="0" r="86" fill="#fff" fill-opacity=".13" stroke="#fff" stroke-opacity=".35" stroke-width="8"/>
    <circle cx="0" cy="0" r="44" fill="#e84d0e"/>
    <path d="M-72 0h144M0-72v144" stroke="#fff" stroke-width="18" stroke-linecap="round"/>
  </g>
  <g transform="translate(875 485)">
