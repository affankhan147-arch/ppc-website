    <path d="M-130-10h54m-27-27v54" stroke="#ff8a54" stroke-width="16" stroke-linecap="round"/>
    <text x="-42" y="-7" fill="#fff" font-family="Arial, Helvetica, sans-serif" font-size="34" font-weight="800">Shut Off Water</text>
    <text x="-42" y="34" fill="#bdeaf2" font-family="Arial, Helvetica, sans-serif" font-size="22" font-weight="600">Call For Emergency Pipe Service</text>
  </g>
